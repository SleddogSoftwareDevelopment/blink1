name: dagger
on:
  push:
    branches: [daggerize]

env:
  NOTHANKS: 1

jobs:
  build:
    name: dagger-build
    runs-on: ubuntu-latest
    steps:
      - name: Call Dagger Function
        uses: dagger/dagger-for-github@v6
        with:
          version: "latest"
          verb: call
          args: build --source=./src